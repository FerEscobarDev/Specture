# Contrato de API — fuente de verdad machine-readable.
# Generado en la Fase 2 (architecture) DESPUÉS de architecture.md y ANTES del ROADMAP.
# Consumido por: specs de backend (implementan operationId), navigation_map y specs de
# frontend (consumen operationId), y el generador de cliente tipado del frontend.
#
# Reglas:
#  - Todo path lleva `operationId` único y estable (es el identificador que citan los specs).
#  - Reusar shapes vía components/schemas — no repetir DTOs inline.
#  - Un envelope de error único en components/schemas/Error.
#  - Cambiar un operationId/método/path existente = breaking change → requiere ADR.
#
# Sustituir todos los [placeholders]. Borrar los ejemplos que no apliquen.

openapi: 3.1.0

info:
  title: "[Nombre del Proyecto] API"
  version: "0.1.0"
  description: "Contrato de la interfaz backend↔frontend. Fuente de verdad."

servers:
  - url: "/api/v1"
    description: "Base URL (ajustar a stack.yml / convenciones)."

# --- Esquema(s) de seguridad ------------------------------------------------
# Ajustar a la estrategia declarada en architecture.md §5.1.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Envelope de error ÚNICO para todo el contrato.
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, description: "Código de error de negocio estable." }
        message: { type: string }
        details: { type: object, additionalProperties: true }

    # --- DTOs del dominio (ejemplo — reemplazar) ----------------------------
    # NombreDTO:
    #   type: object
    #   required: [campoObligatorio]
    #   properties:
    #     campoObligatorio: { type: string }
    #     campoOpcional: { type: integer, nullable: true }

  responses:
    # Respuestas de error reutilizables.
    BadRequest:
      description: Datos inválidos.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: No autenticado.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Recurso no encontrado.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

# Seguridad por defecto (las operaciones públicas la sobreescriben con `security: []`).
security:
  - bearerAuth: []

